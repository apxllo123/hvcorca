name: Publish Nightly Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  bundle-snapshot:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foreman
        uses: rojo-rbx/setup-foreman@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Foreman to PATH
        run: echo "$HOME/.foreman/bin" >> $GITHUB_PATH

      - name: Install Foreman tools
        run: foreman install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile roblox-ts
        run: npm run compile

      - name: Build model
        run: npm run build

      - name: Get snapshot tag
        id: date
        run: echo "tag=nightly-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Bundle snapshot
        run: |
          remodel run ci/bundle.lua public/snapshot.lua ${{ steps.date.outputs.tag }}
          remodel run ci/bundle.lua public/snapshot.debug.lua ${{ steps.date.outputs.tag }} debug

      - name: Commit nightly snapshot
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "['public/snapshot.lua', 'public/snapshot.debug.lua']"
          message: "🔥 Nightly snapshot ${{ steps.date.outputs.tag }}"
