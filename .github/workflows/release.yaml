name: Publish Release

on:
  workflow_dispatch:
  release:
    types: [ published, prereleased ]
    
permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
    - name: GitHub Checkout
      uses: actions/checkout@v4  # Updated

    - name: Setup PNPM
      uses: pnpm/action-setup@v2.2.4
      with:
        version: 7.25.1
        run_install: true
    
    - name: Setup Aftman
      uses: ok-nick/setup-aftman@v0.3.0
    
    - name: Install Rojo & Remodel
      run: aftman install
        
    - name: Setup Node.js  # Added for darklua if needed
      uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Install darklua globally  # Your dark minifier
      run: npm install -g darklua
        
    - name: Resolve version tag  # From second workflow
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        if [ -z "$TAG" ]; then
          TAG="v$(date +%Y%m%d-%H%M)"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Build & Compile
      run: |
        pnpm run build --verbose
        pnpm run rojo --verbose
      
    - name: Bundle Luau  # Enhanced w/ version
      run: |
        ENV=production remodel run bundle.lua dist/main.lua ${{ steps.version.outputs.tag }} minify
        remodel run bundle.lua dist/main-dev.lua ${{ steps.version.outputs.tag }} debug
      
    - name: Commit artifacts to public/  # From second
      uses: EndBug/add-and-commit@v9
      with:
        add: "['dist/main.lua', 'dist/main-dev.lua']"
        message: "🐋 Release ${{ steps.version.outputs.tag }}"
        
    - name: Upload Release Assets
      uses: alexellis/upload-assets@0.4.0
      with:
        asset_paths: '["dist/main.rbxm", "dist/main.lua", "dist/main-dev.lua"]'
