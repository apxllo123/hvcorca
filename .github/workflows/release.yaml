name: Publish Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  bundle-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: master

      - name: Install Foreman
        uses: rojo-rbx/setup-foreman@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Foreman to PATH
        run: echo "$HOME/.foreman/bin" >> $GITHUB_PATH

      - name: Install Foreman tools
        run: foreman install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile roblox-ts
        run: npm run compile

      - name: Build model
        run: npm run build

      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="v$(date +%Y%m%d-%H%M)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Bundle release
        run: |
          remodel run ci/bundle.lua public/latest.lua ${{ steps.version.outputs.tag }}
          remodel run ci/bundle.lua public/latest.debug.lua ${{ steps.version.outputs.tag }} debug

      - name: Commit artifacts
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "['public/latest.lua', 'public/latest.debug.lua']"
          message: "🐋 Release ${{ steps.version.outputs.tag }}"
