name: Publish Release

on:
  workflow_dispatch:
  release:
    types: [ published, prereleased ]
    
permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
    - name: GitHub Checkout
      uses: actions/checkout@v4

    - name: Setup PNPM
      uses: pnpm/action-setup@v4  # Fixed v4
      with:
        version: 9.12.2

    - name: Setup Aftman
      uses: ok-nick/setup-aftman@v0.3.0
    
    - name: Install Rojo & Remodel
      run: aftman install
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'pnpm'  # PNPM cache
        
    - name: Install dependencies  # Replaces run_install + darklua
      run: pnpm install --frozen-lockfile
        
    - name: Resolve version tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        if [ -z "$TAG" ]; then
          TAG="v$(date +%Y%m%d-%H%M)"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Build & Compile
      run: |
        pnpm run build --verbose
        pnpm run rojo --verbose
      
    - name: Bundle Luau
      run: |
        pnpm run bundle:prod  # Uses your package.json (ENV=production)
        pnpm run bundle:dev   # Uses your package.json (ENV=development)
      
    - name: Commit artifacts
      uses: EndBug/add-and-commit@v9
      with:
        add: '["dist/main.lua", "dist/main-dev.lua"]'
        message: "🐋 Release ${{ steps.version.outputs.tag }}"
        
    - name: Upload Release Assets
      uses: alexellis/upload-assets@0.4.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        asset_paths: '["dist/main.rbxm", "dist/main.lua", "dist/main-dev.lua"]'
