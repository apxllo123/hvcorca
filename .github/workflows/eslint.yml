name: ESLint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ESLint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest  # Matches your local pnpm version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Updated to LTS (18 EOL soon)
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile  # Strict for CI

      - name: Run ESLint
        run: pnpm run lint:ci  # Uses your package.json script
