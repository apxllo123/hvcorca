name: ESLint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ESLint:
    runs-on: ubuntu-latest  # Updated

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM  # Added
        uses: pnpm/action-setup@v2.2.4
        with:
          version: 7.25.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'  # PNPM cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile  # pnpm ci equivalent

      - name: Run ESLint
        run: pnpm eslint src/ --ext .ts,.tsx  # pnpm eslint
